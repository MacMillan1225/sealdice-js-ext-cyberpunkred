<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk RED - Edgerunner Sheet v2.0</title>
    <style>
        /* ═══════════════════════════════════════════════════════
           DESIGN SYSTEM — CP2077 TERMINAL v2.0
           Black-red cyberpunk terminal aesthetic
           ═══════════════════════════════════════════════════════ */

        :root {
            /* ── Palette — CP2077 Terminal ── */
            --c-bg: #050505;
            --c-card-bg: rgba(12, 4, 4, 0.92);
            --c-card-bg-secondary: rgba(18, 6, 6, 0.85);
            --c-text-main: #c8c0b8;
            --c-text-dim: #5a4a42;
            --c-text-bright: #f0e8e0;
            --c-accent-red: #ff003c;
            --c-accent-red-bright: #ff2244;
            --c-accent-red-dim: rgba(255, 0, 60, 0.12);
            --c-accent-yellow: #ffb020;
            --c-accent-cyan: #00e5ff;
            --c-hp: #ff003c;
            --c-humanity: #00e5ff;
            --c-armor: #ffb020;
            --c-border: rgba(255, 0, 60, 0.12);
            --c-border-bright: rgba(255, 0, 60, 0.30);
            --c-hover: rgba(255, 0, 60, 0.05);
            --c-input-bg: #0a0202;
            --c-input-border: #ff003c;
            --c-danger: #ff003c;

            /* ── Typography ── */
            --font-mono: "SF Mono", "Cascadia Code", "Consolas", "Courier New", monospace;
            --font-sans: "Segoe UI", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
            --font-display: "Segoe UI", "Helvetica Neue", "PingFang SC", sans-serif;

            /* ── Spacing ── */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 12px;
            --space-lg: 16px;
            --space-xl: 24px;

            /* ── Radii — sharp for CP2077 ── */
            --radius-sm: 2px;
            --radius-md: 3px;
            --radius-lg: 4px;
        }

        /* ── Reset ── */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 0, 60, 0.20);
            border-radius: 2px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 0, 60, 0.40);
        }

        /* ── Body ── */
        body {
            font-family: var(--font-sans);
            background:
                linear-gradient(rgba(255, 0, 60, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 60, 0.015) 1px, transparent 1px),
                var(--c-bg);
            background-size: 50px 50px, 50px 50px, 100% 100%;
            color: var(--c-text-main);
            padding: var(--space-lg) var(--space-md);
            font-size: 13px;
            line-height: 1.5;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* ── CRT Scan Lines — red tinted ── */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(255, 0, 60, 0.018) 2px,
                rgba(255, 0, 60, 0.018) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* ── Noise Texture Overlay ── */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9998;
        }

        /* ═══════════════════════════════════════════════════════
           SHEET CONTAINER — CP2077 Terminal Panel
           ═══════════════════════════════════════════════════════ */
        .sheet-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            background: var(--c-card-bg);
            border: 1px solid var(--c-border-bright);
            box-shadow:
                0 0 60px rgba(255, 0, 60, 0.06),
                0 8px 60px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            position: relative;
            animation: border-pulse 4s ease-in-out infinite;
        }

        @keyframes border-pulse {
            0%, 100% { border-color: rgba(255, 0, 60, 0.20); }
            50% { border-color: rgba(255, 0, 60, 0.35); }
        }

        /* Top red accent line */
        .sheet-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0; right: 0;
            height: 2px;
            background: linear-gradient(
                90deg,
                transparent 0%,
                var(--c-accent-red) 8%,
                var(--c-accent-red-bright) 50%,
                var(--c-accent-red) 92%,
                transparent 100%
            );
            opacity: 0.9;
            z-index: 10;
        }

        /* Corner bracket decorations */
        .sheet-container::after {
            content: '';
            position: absolute;
            inset: 3px;
            pointer-events: none;
            z-index: 10;
            background:
                /* Top-left */
                linear-gradient(var(--c-accent-red), var(--c-accent-red)) 0 0 / 18px 2px no-repeat,
                linear-gradient(var(--c-accent-red), var(--c-accent-red)) 0 0 / 2px 18px no-repeat,
                /* Top-right */
                linear-gradient(var(--c-accent-red), var(--c-accent-red)) 100% 0 / 18px 2px no-repeat,
                linear-gradient(var(--c-accent-red), var(--c-accent-red)) 100% 0 / 2px 18px no-repeat,
                /* Bottom-left */
                linear-gradient(var(--c-accent-red), var(--c-accent-red)) 0 100% / 18px 2px no-repeat,
                linear-gradient(var(--c-accent-red), var(--c-accent-red)) 0 100% / 2px 18px no-repeat,
                /* Bottom-right */
                linear-gradient(var(--c-accent-red), var(--c-accent-red)) 100% 100% / 18px 2px no-repeat,
                linear-gradient(var(--c-accent-red), var(--c-accent-red)) 100% 100% / 2px 18px no-repeat;
            opacity: 0.5;
        }

        /* ═══════════════════════════════════════════════════════
           HEADER
           ═══════════════════════════════════════════════════════ */
        .header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(320px, 420px);
            align-items: center;
            gap: var(--space-lg);
            padding: var(--space-xl) var(--space-lg) var(--space-lg);
            background: linear-gradient(
                180deg,
                rgba(255, 0, 60, 0.04) 0%,
                transparent 100%
            );
            border-bottom: 1px solid var(--c-border);
            position: relative;
        }

        .header-main {
            display: flex;
            align-items: center;
            min-width: 0;
        }

        .avatar {
            width: 68px;
            height: 68px;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, #0a0303, #140606);
            border: 1.5px solid var(--c-border-bright);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: var(--space-lg);
            overflow: hidden;
            font-size: 28px;
            color: var(--c-accent-red);
            flex-shrink: 0;
            box-shadow:
                0 0 20px rgba(255, 0, 60, 0.15),
                inset 0 0 20px rgba(255, 0, 60, 0.05);
            font-family: var(--font-display);
            font-weight: 700;
            letter-spacing: 2px;
            position: relative;
        }

        .avatar::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, rgba(255, 0, 60, 0.15), transparent, rgba(255, 176, 32, 0.08));
            pointer-events: none;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info {
            flex: 1;
            min-width: 0;
        }

        .name {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 2px;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            text-shadow: 0 0 30px rgba(255, 0, 60, 0.5);
        }

        /* Glitch pseudo-elements for name */
        .name::before,
        .name::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .name::before {
            color: var(--c-accent-cyan);
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
            transform: translate(-2px, -1px);
            opacity: 0;
            animation: glitch-top 4s infinite;
        }

        .name::after {
            color: var(--c-accent-red);
            clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
            transform: translate(2px, 1px);
            opacity: 0;
            animation: glitch-bottom 4s infinite;
        }

        @keyframes glitch-top {
            0%, 92%, 100% { opacity: 0; transform: translate(0); }
            93% { opacity: 0.8; transform: translate(-3px, -1px); }
            94% { opacity: 0; }
            96% { opacity: 0.6; transform: translate(2px, 0); }
            97% { opacity: 0; }
        }

        @keyframes glitch-bottom {
            0%, 92%, 100% { opacity: 0; transform: translate(0); }
            93.5% { opacity: 0.7; transform: translate(3px, 1px); }
            94.5% { opacity: 0; }
            95.5% { opacity: 0.5; transform: translate(-2px, 0); }
            96.5% { opacity: 0; }
        }

        .role-info {
            display: flex;
            gap: var(--space-lg);
            flex-wrap: wrap;
            margin-top: 6px;
        }

        .info-item {
            font-size: 11px;
            color: var(--c-text-dim);
            display: flex;
            align-items: center;
            gap: var(--space-xs);
        }

        .info-label {
            color: var(--c-accent-yellow);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-family: var(--font-mono);
            font-size: 10px;
            opacity: 0.9;
        }

        .info-value {
            color: var(--c-text-main);
        }

        .header-hud {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 120px;
            gap: 10px;
            align-items: stretch;
            min-height: 68px;
        }

        .hud-vitals {
            display: grid;
            gap: 5px;
            height: 100%;
        }

        .hud-vital {
            display: grid;
            grid-template-columns: 54px minmax(32px, auto) minmax(0, 1fr);
            align-items: center;
            gap: 8px;
            padding: 4px 0;
        }

        .hud-vital-icon,
        .hud-meta-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 0, 60, 0.2);
            background: rgba(255, 0, 60, 0.05);
            color: var(--c-accent-yellow);
            font-family: var(--font-mono);
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .hud-vital-value {
            display: flex;
            flex-direction: column;
            gap: 1px;
            min-width: 0;
        }

        .hud-vital-label {
            font-size: 9px;
            color: var(--c-text-dim);
            font-family: var(--font-mono);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .hud-vital-number {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 800;
            line-height: 1;
            cursor: pointer;
        }

        .hud-vital.st-hp .hud-vital-number {
            color: var(--c-hp);
            text-shadow: 0 0 12px rgba(255, 0, 60, 0.5);
        }

        .hud-vital.st-arm .hud-vital-number {
            color: var(--c-armor);
            text-shadow: 0 0 12px rgba(255, 176, 32, 0.5);
        }

        .hud-vital.st-hum .hud-vital-number {
            color: var(--c-humanity);
            text-shadow: 0 0 12px rgba(0, 229, 255, 0.45);
        }

        .hud-meta {
            display: grid;
            grid-template-rows: repeat(3, 1fr);
            gap: 5px;
            height: 100%;
        }

        .hud-meta-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            padding: 4px 0 4px 8px;
            border-left: 1px solid rgba(255, 0, 60, 0.12);
        }

        .hud-meta-copy {
            min-width: 0;
            flex: 1;
        }

        .hud-meta-label {
            display: block;
            font-size: 9px;
            color: var(--c-text-dim);
            font-family: var(--font-mono);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .hud-meta-value {
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 700;
            color: var(--c-text-bright);
            line-height: 1;
            cursor: pointer;
            text-align: right;
        }

        /* ═══════════════════════════════════════════════════════
           STATUS BAR — Vitals Strip
           ═══════════════════════════════════════════════════════ */
        .status-bar { display: none; }

        .status-item {
            background: rgba(8, 3, 3, 0.6);
            padding: var(--space-md) var(--space-sm) 10px;
            text-align: center;
            transition: background 0.25s ease;
            position: relative;
        }

        .status-item:hover {
            background: var(--c-hover);
        }

        .status-label {
            font-size: 9px;
            color: var(--c-text-dim);
            display: block;
            margin-bottom: 4px;
            letter-spacing: 2px;
            font-family: var(--font-mono);
            text-transform: uppercase;
        }

        .status-val {
            font-family: var(--font-mono);
            font-size: 24px;
            font-weight: 800;
            cursor: pointer;
            transition: text-shadow 0.25s ease;
            letter-spacing: 1px;
        }

        .st-hp .status-val {
            color: var(--c-hp);
            text-shadow: 0 0 12px rgba(255, 0, 60, 0.5);
        }
        .st-hum .status-val {
            color: var(--c-humanity);
            text-shadow: 0 0 12px rgba(0, 229, 255, 0.5);
        }
        .st-arm .status-val {
            color: var(--c-armor);
            text-shadow: 0 0 12px rgba(255, 176, 32, 0.5);
        }
        .st-neutral .status-val {
            color: var(--c-text-bright);
            text-shadow: 0 0 8px rgba(240, 232, 224, 0.3);
        }

        /* ── Segmented Progress Bars ── */
        .progress-bar {
            display: flex;
            gap: 4px;
            margin-top: 0;
            padding: 0;
            align-self: center;
        }

        .progress-segment {
            flex: 1;
            height: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 3px;
            transform: skewX(-24deg);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .progress-segment.filled {
            border-color: transparent;
        }

        .progress-hp .progress-segment.filled {
            background: var(--c-hp);
            box-shadow: 0 0 4px rgba(255, 0, 60, 0.5);
        }

        .progress-arm .progress-segment.filled {
            background: var(--c-armor);
            box-shadow: 0 0 4px rgba(255, 176, 32, 0.4);
        }

        .progress-hum .progress-segment.filled {
            background: var(--c-humanity);
            box-shadow: 0 0 4px rgba(0, 229, 255, 0.4);
        }

        /* ═══════════════════════════════════════════════════════
           MAIN CONTENT — Two-Column Grid
           ═══════════════════════════════════════════════════════ */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1px;
            background: var(--c-border);
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .left-panel, .right-panel {
            background: rgba(6, 2, 2, 0.4);
        }

        /* ── Section Title ── */
        .section-title {
            font-family: var(--font-mono);
            background: linear-gradient(90deg, rgba(255, 0, 60, 0.08), transparent);
            color: var(--c-accent-red);
            font-size: 10px;
            padding: 10px var(--space-lg);
            border-bottom: 1px solid var(--c-border);
            border-top: 1px solid rgba(255, 0, 60, 0.10);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
            position: relative;
        }

        .section-title::before {
            content: '>';
            opacity: 0.5;
            margin-right: 6px;
            font-weight: 400;
            color: var(--c-accent-red);
        }

        /* Decorative right accent on section titles */
        .section-title::after {
            content: '';
            position: absolute;
            right: var(--space-lg);
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 1px;
            background: linear-gradient(90deg, var(--c-accent-red), transparent);
            opacity: 0.4;
        }

        /* ═══════════════════════════════════════════════════════
           CORE ATTRIBUTES — Left Panel
           ═══════════════════════════════════════════════════════ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 1px;
            background: var(--c-border);
        }

        .stat-box {
            background: linear-gradient(180deg, rgba(12, 4, 4, 0.92), rgba(8, 2, 2, 0.95));
            padding: 12px;
            min-height: 0;
            aspect-ratio: 1 / 1;
            position: relative;
            overflow: hidden;
            transition: background 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            align-items: stretch;
            justify-content: center;
        }

        .stat-box:hover {
            background: linear-gradient(180deg, rgba(18, 6, 6, 0.95), rgba(10, 3, 3, 0.96));
            box-shadow: inset 0 0 0 1px rgba(255, 0, 60, 0.12);
        }

        .stat-box::before {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(255, 0, 60, 0.06);
            pointer-events: none;
        }

        .stat-bg-icon {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 1px;
            color: rgba(255, 0, 60, 0.08);
            pointer-events: none;
            user-select: none;
        }

        .stat-name {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            color: var(--c-text-dim);
            font-size: 10px;
            cursor: pointer;
            transition: color 0.2s ease, text-shadow 0.2s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
            z-index: 2;
        }

        .stat-name:hover {
            color: var(--c-accent-red);
            text-shadow: 0 0 10px rgba(255, 0, 60, 0.4);
        }

        .stat-val {
            font-family: var(--font-display);
            font-size: 40px;
            font-weight: 800;
            color: var(--c-text-bright);
            cursor: pointer;
            align-self: center;
            justify-self: center;
            line-height: 1;
            z-index: 2;
            transition: color 0.2s ease, text-shadow 0.2s ease;
        }

        .stat-val:hover {
            color: #fff;
            text-shadow: 0 0 14px rgba(255, 0, 60, 0.5);
        }

        .stat-code {
            position: absolute;
            right: 10px;
            bottom: 10px;
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 700;
            color: var(--c-accent-yellow);
            letter-spacing: 1px;
            z-index: 2;
            text-transform: uppercase;
        }

        /* ═══════════════════════════════════════════════════════
           SKILLS — Right Panel
           ═══════════════════════════════════════════════════════ */
        .skills-container {
            padding: var(--space-md) var(--space-lg);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: var(--space-md);
            align-items: start;
        }

        .skill-category {
            margin-bottom: 0;
            background: rgba(10, 3, 3, 0.28);
            border: 1px solid rgba(255, 0, 60, 0.05);
            padding: 10px;
        }

        .skill-category:last-child {
            margin-bottom: 0;
        }

        .category-header {
            font-size: 10px;
            color: var(--c-accent-yellow);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: var(--space-sm);
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(255, 176, 32, 0.15);
            font-weight: 700;
            font-family: var(--font-mono);
        }

        .skill-item {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: 5px var(--space-sm);
            border-bottom: 1px solid rgba(255, 0, 60, 0.04);
            transition: background 0.15s ease;
            border-radius: var(--radius-sm);
        }

        .skill-item:hover {
            background: rgba(255, 0, 60, 0.03);
        }

        /* ── Skill Icon Placeholder ── */
        .skill-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            font-size: 10px;
            color: var(--c-accent-red);
            border: 1px solid rgba(255, 0, 60, 0.18);
            background: rgba(255, 0, 60, 0.04);
            flex-shrink: 0;
            opacity: 0.7;
        }

        .skill-name {
            font-size: 12px;
            cursor: pointer;
            color: var(--c-text-main);
            transition: color 0.2s ease;
            flex: 1;
        }

        .skill-name:hover {
            color: var(--c-accent-red);
        }

        .skill-base {
            font-size: 10px;
            color: var(--c-text-dim);
            margin-left: var(--space-sm);
            font-family: var(--font-mono);
        }

        .skill-val {
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 600;
            color: var(--c-text-dim);
            cursor: pointer;
            padding: 2px 10px;
            border-radius: var(--radius-sm);
            transition: background 0.2s ease, color 0.2s ease;
            min-width: 32px;
            text-align: center;
        }

        .skill-val:hover {
            color: #fff;
            background: rgba(255, 0, 60, 0.08);
        }

        /* ═══════════════════════════════════════════════════════
           EQUIPMENT — Weapons & Armor
           ═══════════════════════════════════════════════════════ */
        .equipment-section {
            padding: var(--space-md) var(--space-lg);
        }

        .equipment-grid {
            display: grid;
            gap: var(--space-md);
        }

        .equipment-item {
            background: rgba(18, 6, 6, 0.6);
            padding: var(--space-md);
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 0, 60, 0.08);
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .equipment-item:hover {
            border-color: rgba(255, 0, 60, 0.20);
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.06);
        }

        /* Red-yellow gradient accent bar on equipment cards */
        .equipment-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, var(--c-accent-red), var(--c-accent-yellow));
            opacity: 0.5;
        }

        .equipment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .equipment-name {
            font-size: 13px;
            color: var(--c-text-bright);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .equipment-stats {
            display: flex;
            gap: var(--space-md);
            flex-wrap: wrap;
            font-size: 11px;
        }

        .equipment-stat {
            color: var(--c-text-dim);
        }

        .equipment-stat-label {
            color: var(--c-accent-yellow);
            margin-right: 4px;
            font-family: var(--font-mono);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ═══════════════════════════════════════════════════════
           NOTES
           ═══════════════════════════════════════════════════════ */
        .notes-section {
            padding: var(--space-md) var(--space-lg);
        }

        .notes-content {
            background: rgba(18, 6, 6, 0.5);
            padding: var(--space-md);
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 0, 60, 0.06);
            min-height: 60px;
            font-size: 12px;
            line-height: 1.7;
            color: var(--c-text-main);
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* ═══════════════════════════════════════════════════════
           INLINE EDITOR
           ═══════════════════════════════════════════════════════ */
        .inline-editor {
            width: 60px;
            background: var(--c-input-bg);
            color: #fff;
            border: 1px solid var(--c-input-border);
            border-radius: var(--radius-sm);
            font-family: var(--font-mono);
            font-size: inherit;
            font-weight: 700;
            padding: 4px 6px;
            text-align: center;
            box-shadow:
                0 0 12px rgba(255, 0, 60, 0.25),
                inset 0 0 8px rgba(255, 0, 60, 0.05);
            outline: none;
            transition: box-shadow 0.2s ease;
        }

        .inline-editor:focus {
            box-shadow:
                0 0 20px rgba(255, 0, 60, 0.4),
                inset 0 0 12px rgba(255, 0, 60, 0.08);
            border-color: #ff3355;
        }

        /* ═══════════════════════════════════════════════════════
           EMPTY STATE
           ═══════════════════════════════════════════════════════ */
        .empty-msg {
            padding: 80px var(--space-xl);
            text-align: center;
            color: var(--c-text-dim);
            font-family: var(--font-mono);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
        }

        .empty-msg::before {
            content: '[ ';
            color: var(--c-accent-red);
            opacity: 0.5;
        }

        .empty-msg::after {
            content: ' ]';
            color: var(--c-accent-red);
            opacity: 0.5;
        }

        /* ═══════════════════════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════════════════════ */
        @media (max-width: 600px) {
            body {
                padding: var(--space-sm);
            }

            .header {
                grid-template-columns: 1fr;
                padding: var(--space-lg) var(--space-md) var(--space-md);
            }

            .header-main {
                align-items: flex-start;
            }

            .avatar {
                width: 52px;
                height: 52px;
                font-size: 22px;
                margin-right: var(--space-md);
            }

            .name {
                font-size: 18px;
                letter-spacing: 1px;
            }

            .role-info {
                gap: var(--space-sm);
            }

            .hud-meta {
                grid-template-rows: repeat(3, 1fr);
            }

            .stats-grid {
                grid-template-columns: repeat(5, minmax(0, 1fr));
            }

            .stat-val {
                font-size: 28px;
            }

            .skills-container {
                padding: var(--space-sm) var(--space-md);
                grid-template-columns: 1fr;
            }

            .equipment-section,
            .notes-section {
                padding: var(--space-sm) var(--space-md);
            }

            .skill-icon {
                width: 16px;
                height: 16px;
                font-size: 8px;
            }
        }

        @media (max-width: 1100px) {
            .header {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="content"></div>

    <script>
        var _windowId = null;
        var _rollDispatchMode = 'default';

        function normalizeRollDispatchMode(mode) {
            return mode === 'template' ? 'template' : 'default';
        }

        function withRollDispatchMode(roll) {
            return Object.assign({}, roll || {}, { dispatchMode: _rollDispatchMode });
        }

        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function postEvent(action, payload) {
            if (!_windowId) return;
            window.parent.postMessage({
                type: 'SEALCHAT_EVENT',
                version: 1,
                windowId: _windowId,
                action: action,
                payload: payload
            }, '*');
        }

        window.sealchat = {
            onUpdate: function(cb) {
                window.addEventListener('message', function(e) {
                    if (e.source !== window.parent) return;
                    if (e.data && e.data.type === 'SEALCHAT_UPDATE') {
                        _windowId = e.data.payload.windowId;
                        cb(e.data.payload);
                    }
                });
            },
            setRollDispatchMode: function(mode) {
                _rollDispatchMode = normalizeRollDispatchMode(mode);
            },
            roll: function(template, label, args) {
                postEvent('ROLL_DICE', {
                    roll: withRollDispatchMode({ template: template, label: label || '', args: args || {} })
                });
            },
            updateAttrs: function(attrs) {
                postEvent('UPDATE_ATTRS', { attrs: attrs });
            },
        };

        var CORE_STATS = ['智力', '反应', '敏捷', '技术', '酷', '意志', '幸运', '移动', '体魄', '共情'];
        var STATUS_KEYS = ['生命值', '护甲', '人性', '残废', '重伤阈值', '死亡豁免'];

        var SKILL_CATEGORIES = {
            '感知类': ['专注力', '藏匿/搜寻物品', '唇语', '觉察', '追踪'],
            '体魄类': ['运动', '柔术', '舞蹈', '忍耐', '抵抗拷问/药物', '潜行'],
            '操控类': ['驾驶地面载具', '驾驶飞行载具', '驾驶水上载具', '骑乘'],
            '教育类': ['会计', '驯兽', '官僚世故', '商业', '创作', '犯罪学', '密码学', '推理', '教育', '赌博', '语言', '图书馆检索', '本地专家', '科学', '战术', '野外生存'],
            '战斗类': ['徒手搏斗', '闪避', '武术', '近战武器'],
            '表演类': ['表演', '乐器演奏'],
            '远程武器类': ['箭术', '自动武器', '手枪', '重型武器', '抵肩枪械'],
            '社交类': ['贿赂', '交谈', '察言观色', '审讯', '说服', '个人仪容', '街头智慧', '交易', '衣着与风格'],
            '技术类': ['飞行载具技术', '基础技术', '赛博技术', '爆破', '电子/安防技术', '急救', '伪造', '地面载具技术', '绘画/素描/雕塑', '医疗', '摄影/影片', '撬锁', '扒窃', '水上载具技术', '武器技术']
        };

        var STATUS_MAP = {
            '生命值': { cls: 'st-hp', label: '生命值' },
            '护甲': { cls: 'st-arm', label: '护甲' },
            '人性': { cls: 'st-hum', label: '人性' },
            '残废': { cls: 'st-neutral', label: '身体重伤' },
            '重伤阈值': { cls: 'st-neutral', label: '重伤阈值' },
            '死亡豁免': { cls: 'st-neutral', label: '死亡豁免' }
        };

        /* ── NEW: Stat icon abbreviations for placeholder boxes ── */
        var STAT_ICONS = {
            '智力': 'INT', '反应': 'REF', '敏捷': 'DEX', '技术': 'TECH',
            '酷': 'COOL', '意志': 'WILL', '幸运': 'LUCK', '移动': 'MOVE',
            '体魄': 'BODY', '共情': 'EMP'
        };

        /* ── NEW: Progress bar reference max values and color classes ── */
        var PROGRESS_MAX = { '生命值': 50, '护甲': 20, '人性': 100 };
        var PROGRESS_CLS = { '生命值': 'progress-hp', '护甲': 'progress-arm', '人性': 'progress-hum' };

        /* ── NEW: Render segmented progress bar ── */
        function renderProgressBar(key, value) {
            var max = PROGRESS_MAX[key];
            if (!max) return '';
            var num = Number(value);
            var segments = 10;
            var filled = 0;
            if (!isNaN(num) && num > 0) {
                var pct = Math.min(100, Math.round((num / max) * 100));
                filled = Math.round((pct / 100) * segments);
            }
            var cls = PROGRESS_CLS[key] || '';
            var html = '<div class="progress-bar ' + cls + '">';
            for (var i = 0; i < segments; i++) {
                html += '<div class="progress-segment' + (i < filled ? ' filled' : '') + '"></div>';
            }
            html += '</div>';
            return html;
        }

        /* ── NEW: Get stat icon placeholder text ── */
        function getStatIcon(name) {
            return STAT_ICONS[name] || '\u25C6';
        }

        function render(data) {
            var el = document.getElementById('content');
            if (!data || !data.attrs || Object.keys(data.attrs).length === 0) {
                el.innerHTML = '<div class="empty-msg">Awaiting edgerunner data uplink...</div>';
                return;
            }

            var attrs = data.attrs;
            var html = '<div class="sheet-container">';

            // ── Header ──
            var avatarUrl = data.avatarUrl || '';
            var initialChar = escapeHtml((data.name || '?').charAt(0)).toUpperCase();
            var avatarHtml = avatarUrl
                ? '<img src="' + escapeHtml(avatarUrl) + '" alt="avatar">'
                : initialChar;

            html += '<div class="header">';
            html += '<div class="header-main">';
            html += '<div class="avatar">' + avatarHtml + '</div>';
            html += '<div class="info">';
            html += '<div class="name" data-text="' + escapeHtml(data.name || 'Unknown Edgerunner') + '">' +
                escapeHtml(data.name || 'Unknown Edgerunner') + '</div>';
            html += '<div class="role-info">';
            if (attrs['身份']) {
                html += '<div class="info-item"><span class="info-label">Role</span><span class="info-value">' +
                    escapeHtml(attrs['身份']) + '</span></div>';
            }
            if (attrs['身份能力']) {
                html += '<div class="info-item"><span class="info-label">Ability</span><span class="info-value">' +
                    escapeHtml(attrs['身份能力']) + '</span></div>';
            }
            html += '</div>';
            html += '</div>';
            html += '</div>';

            html += '<div class="header-hud">';
            html += '<div class="hud-vitals">';
            ['生命值', '护甲', '人性'].forEach(function(k) {
                var conf = STATUS_MAP[k];
                var rawVal = attrs[k] !== undefined ? attrs[k] : '--';
                html += '<div class="hud-vital ' + conf.cls + '">';
                html += '<span class="hud-vital-label">' + escapeHtml(conf.label) + '</span>';
                html += '<div class="hud-vital-value">';
                html += '<span class="hud-vital-number status-val" data-attr="' + escapeHtml(k) + '" data-value="' + escapeHtml(String(rawVal)) + '">' + escapeHtml(String(rawVal)) + '</span>';
                html += '</div>';
                html += renderProgressBar(k, rawVal);
                html += '</div>';
            });
            html += '</div>';

            html += '<div class="hud-meta">';
            ['残废', '重伤阈值', '死亡豁免'].forEach(function(k) {
                var rawVal = attrs[k] !== undefined ? attrs[k] : '--';
                html += '<div class="hud-meta-item">';
                html += '<div class="hud-meta-copy">';
                html += '<span class="hud-meta-label">' + escapeHtml(k) + '</span>';
                html += '</div>';
                html += '<span class="hud-meta-value status-val" data-attr="' + escapeHtml(k) + '" data-value="' + escapeHtml(String(rawVal)) + '">' + escapeHtml(String(rawVal)) + '</span>';
                html += '</div>';
            });
            html += '</div>';
            html += '</div>';
            html += '</div>';

            // ── Main Content ──
            html += '<div class="main-content">';

            // Left Panel — Core Stats
            html += '<div class="left-panel">';
            html += '<div class="section-title">Core Attributes</div>';
            html += '<div class="stats-grid">';
            CORE_STATS.forEach(function(k) {
                var rawVal = attrs[k] !== undefined ? attrs[k] : '';
                if (rawVal === '') return;
                html += '<div class="stat-box">';
                html += '<span class="stat-bg-icon">' + escapeHtml(getStatIcon(k)) + '</span>';
                html += '<span class="stat-name" data-roll=".ra ' + escapeHtml(k) + '" data-skill="' + escapeHtml(k) + '">' + escapeHtml(k) + '</span>';
                html += '<span class="stat-val" data-attr="' + escapeHtml(k) + '" data-value="' + escapeHtml(String(rawVal)) + '">' + escapeHtml(String(rawVal)) + '</span>';
                html += '<span class="stat-code">' + escapeHtml(getStatIcon(k)) + '</span>';
                html += '</div>';
            });
            html += '</div>';

            // Notes
            if (attrs['备注']) {
                html += '<div class="section-title">Notes</div>';
                html += '<div class="notes-section">';
                html += '<div class="notes-content">' + escapeHtml(attrs['备注']) + '</div>';
                html += '</div>';
            }

            html += '</div>';

            // Right Panel — Skills
            html += '<div class="right-panel">';
            html += '<div class="section-title">Skills</div>';
            html += '<div class="skills-container">';

            for (var category in SKILL_CATEGORIES) {
                var skills = SKILL_CATEGORIES[category];
                var hasSkills = false;
                var categoryHtml = '<div class="skill-category">';
                categoryHtml += '<div class="category-header">' + escapeHtml(category) + '</div>';

                skills.forEach(function(skillName) {
                    if (attrs[skillName] !== undefined) {
                        hasSkills = true;
                        var val = attrs[skillName];
                        categoryHtml += '<div class="skill-item">';
                        /* NEW: Icon placeholder */
                        categoryHtml += '<span class="skill-icon">\u25C6</span>';
                        categoryHtml += '<span class="skill-name" data-roll=".rc ' + escapeHtml(skillName) +
                            '" data-skill="' + escapeHtml(skillName) + '">' + escapeHtml(skillName) + '</span>';
                        categoryHtml += '<span class="skill-val" data-attr="' + escapeHtml(skillName) +
                            '" data-value="' + escapeHtml(String(val)) + '">' + escapeHtml(String(val)) + '</span>';
                        categoryHtml += '</div>';
                    }
                });

                categoryHtml += '</div>';
                if (hasSkills) {
                    html += categoryHtml;
                }
            }

            html += '</div>';
            html += '</div>';

            html += '</div>'; // main-content

            // ── Equipment Section ──
            var weapons = [];
            var armor = [];
            for (var key in attrs) {
                if (key.startsWith('武器_')) {
                    weapons.push({ name: key.replace('武器_', ''), data: attrs[key] });
                } else if (key.startsWith('护甲_')) {
                    armor.push({ name: key.replace('护甲_', ''), data: attrs[key] });
                }
            }

            if (weapons.length > 0 || armor.length > 0) {
                html += '<div class="section-title">Equipment</div>';
                html += '<div class="equipment-section">';
                html += '<div class="equipment-grid">';

                armor.forEach(function(item) {
                    html += '<div class="equipment-item">';
                    html += '<div class="equipment-header">';
                    html += '<span class="equipment-name">\u{1F6E1}\uFE0F ' + escapeHtml(item.name) + '</span>';
                    html += '</div>';
                    html += '<div class="equipment-stats">';
                    var armorData = item.data;
                    if (typeof armorData === 'string') {
                        try { armorData = JSON.parse(armorData); } catch(e) {}
                    }
                    if (typeof armorData === 'object' && armorData !== null) {
                        for (var prop in armorData) {
                            html += '<span class="equipment-stat">';
                            html += '<span class="equipment-stat-label">' + escapeHtml(prop) + ':</span>';
                            html += escapeHtml(String(armorData[prop]));
                            html += '</span>';
                        }
                    } else {
                        html += '<span class="equipment-stat">防御: ' + escapeHtml(String(armorData)) + '</span>';
                    }
                    html += '</div>';
                    html += '</div>';
                });

                weapons.forEach(function(item) {
                    html += '<div class="equipment-item">';
                    html += '<div class="equipment-header">';
                    html += '<span class="equipment-name">\u2694\uFE0F ' + escapeHtml(item.name) + '</span>';
                    html += '</div>';
                    html += '<div class="equipment-stats">';
                    var weaponData = item.data;
                    if (typeof weaponData === 'string') {
                        try { weaponData = JSON.parse(weaponData); } catch(e) {}
                    }
                    if (typeof weaponData === 'object' && weaponData !== null) {
                        for (var prop in weaponData) {
                            html += '<span class="equipment-stat">';
                            html += '<span class="equipment-stat-label">' + escapeHtml(prop) + ':</span>';
                            html += escapeHtml(String(weaponData[prop]));
                            html += '</span>';
                        }
                    } else {
                        html += '<span class="equipment-stat">' + escapeHtml(String(weaponData)) + '</span>';
                    }
                    html += '</div>';
                    html += '</div>';
                });

                html += '</div>';
                html += '</div>';
            }

            html += '</div>'; // sheet-container
            el.innerHTML = html;
        }

        function openInlineEditor(target) {
            if (target.dataset.editing === '1') return;
            var attrKey = target.dataset.attr;
            var currentVal = target.dataset.value;
            if (currentVal === '--') currentVal = '';

            var input = document.createElement('input');
            input.type = 'number';
            input.value = currentVal;
            input.className = 'inline-editor';

            var originalWidth = target.offsetWidth;
            input.style.width = Math.max(originalWidth + 16, 50) + 'px';

            target.textContent = '';
            target.appendChild(input);
            target.dataset.editing = '1';
            input.focus();
            input.select();

            var commit = function() {
                var val = input.value.trim();
                var num = Number(val);
                if (val === '' || isNaN(num)) {
                    cancel();
                    return;
                }
                target.textContent = val;
                target.dataset.value = val;
                target.dataset.editing = '';
                var patch = {};
                patch[attrKey] = num;
                postEvent('UPDATE_ATTRS', { attrs: patch });
            };

            var cancel = function() {
                target.textContent = currentVal || '--';
                target.dataset.editing = '';
            };

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { e.preventDefault(); commit(); }
                if (e.key === 'Escape') { e.preventDefault(); cancel(); }
            });
            input.addEventListener('blur', commit);
            input.addEventListener('click', function(e) { e.stopPropagation(); });
        }

        document.addEventListener('click', function(e) {
            var target = e.target;

            if (target.classList.contains('stat-val') ||
                target.classList.contains('skill-val') ||
                target.classList.contains('status-val')) {
                openInlineEditor(target);
                return;
            }

            while (target && target !== document.body) {
                if (target.dataset && target.dataset.roll) {
                    var rect = target.getBoundingClientRect();
                    postEvent('ROLL_DICE', {
                        roll: withRollDispatchMode({
                            template: target.dataset.roll,
                            label: target.innerText || target.dataset.skill,
                            args: { skill: target.dataset.skill },
                            rect: { top: rect.top, left: rect.left, width: rect.width, height: rect.height }
                        })
                    });
                    return;
                }
                target = target.parentElement;
            }
        });

        sealchat.onUpdate(render);
    </script>
</body>
</html>
